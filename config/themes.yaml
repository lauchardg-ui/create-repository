# Default theme dictionary. Each theme is a list of case-insensitive keywords or
# phrases. Phrase matches are whole-word; substring matches happen on tokens.
# Edit freely — the app reloads this on each run.

themes:
  Work:
    - meeting
    - deadline
    - project
    - sprint
    - standup
    - kickoff
    - milestone
    - roadmap
    - okr
    - stakeholder
    - review
